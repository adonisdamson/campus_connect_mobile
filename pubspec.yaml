name: campus_connect_mobile
description: "Campus Connect — campus super-app (rides · delivery · marketplace · services)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.5.0+1
  socket_io_client: ^3.0.0

  # Maps (MapLibre GL — vector tiles)
  maplibre_gl: ^0.26.0
  latlong2: 0.9.1

  # Location + GPS
  geolocator: ^12.0.0

  # Icons + fonts
  phosphor_flutter: ^2.1.0
  google_fonts: ^6.2.1

  # Auth (Firebase / Google sign-in + JWT)
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

  # Push notifications
  firebase_messaging: ^15.1.3

  # Utilities
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2

  # Receipts (PDF) + sharing
  pdf: ^3.11.1
  share_plus: ^10.0.3
  path_provider: ^2.1.4

  # Charts (analytics)
  fl_chart: ^0.70.2

  # Animations + media
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

  # Formatting / i18n
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

# Native launcher icon — generate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/brand/app_icon.png"
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/brand/app_icon_fg.png"

# Native OS splash (before Flutter boots) — generate with:
#   dart run flutter_native_splash:create
# The pulse mark centred on the ink canvas, matching the in-app SplashScreen.
flutter_native_splash:
  color: "#0B0D10"
  image: assets/brand/app_icon_fg.png
  android: true
  ios: false
  android_12:
    color: "#0B0D10"
    image: assets/brand/app_icon_fg.png

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/logo/
    - assets/illustrations/
    - assets/lottie/
