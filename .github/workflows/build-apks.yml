name: Build APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # needed to publish releases

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [user, partner, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # maplibre_gl compiles at Java 21 source level — JDK 17 fails with
          # "invalid source release: 21".
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: stable
          cache: true

      - run: flutter pub get

      # Universal release APK (all ABIs in one file — installs on any device,
      # including new arm64 phones). No --split-per-abi, so it's a single APK.
      - name: Build ${{ matrix.flavor }} APK
        run: >-
          flutter build apk --release
          --flavor ${{ matrix.flavor }}
          -t lib/main_${{ matrix.flavor }}.dart
          --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}
          --dart-define=TOMTOM_API_KEY=${{ secrets.TOMTOM_API_KEY }}
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Rename for release
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-release.apk \
             out/CampusConnect-${{ matrix.flavor }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}
          path: out/CampusConnect-${{ matrix.flavor }}.apk
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: List APKs
        run: ls -lh apks

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Campus Connect — build ${{ github.run_number }}
          body: |
            Universal release APKs (install on any Android device, incl. new arm64 phones).

            - **CampusConnect-user.apk** — rider / customer app
            - **CampusConnect-partner.apk** — driver / vendor / provider app
            - **CampusConnect-admin.apk** — operations app

            Built from `${{ github.sha }}`.
          files: apks/*.apk
          fail_on_unmatched_files: true
