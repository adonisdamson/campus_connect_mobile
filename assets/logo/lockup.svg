<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Campus Connect primary horizontal logo lockup">
  <rect width="800" height="200" fill="#F5F5F5"/>

  <!-- Exact finalized Campus Connect logo mark, scaled from 500x500 to 160x160 -->
  <g transform="translate(20 20) scale(0.32)">
    <rect x="20" y="20" width="460" height="460" rx="120" fill="#0D0D0D"/>

    <!-- Outer split ring -->
    <path d="M 290.48 401.07 A 156.4 156.4 0 1 1 250 93.6" stroke="#00C853" stroke-width="60" stroke-linecap="butt"/>
    <circle cx="290.48" cy="401.07" r="30" fill="#00C853"/>

    <path d="M 250 93.6 A 156.4 156.4 0 0 1 401.07 209.52" stroke="#FFFFFF" stroke-width="60" stroke-linecap="butt"/>
    <circle cx="401.07" cy="209.52" r="30" fill="#FFFFFF"/>

    <!-- Inner white campus ring -->
    <path d="M 159.21 283.04 A 96.6 96.6 0 1 1 342.09 220.15" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round"/>

    <!-- Central campus node -->
    <rect x="238.5" y="213.2" width="23" height="73.6" rx="11.5" fill="#00C853"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Arial Rounded MT Bold', 'Trebuchet MS', 'DM Sans', 'Plus Jakarta Sans', Arial, sans-serif" font-weight="700" font-size="58" letter-spacing="-1px">
    <text x="204" y="75" fill="#0D0D0D">Campus</text>
    <text x="204" y="135" fill="#00C853">Connect</text>
    <rect x="204" y="141" width="238" height="4" rx="2" fill="#00C853"/>
  </g>
</svg>