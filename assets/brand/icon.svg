<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Launcher / marketing icon: the mark on the ink canvas with a soft neon glow. -->
  <rect width="192" height="192" rx="46" fill="#0E0F12"/>
  <rect x="3" y="3" width="186" height="186" rx="43" stroke="#202128" stroke-width="2"/>
  <g filter="url(#glow)">
    <line x1="70" y1="70" x2="122" y2="122" stroke="#CBFF3C" stroke-width="24" stroke-linecap="round"/>
    <circle cx="70" cy="70" r="23" fill="#CBFF3C"/>
    <circle cx="122" cy="122" r="25" fill="none" stroke="#CBFF3C" stroke-width="13"/>
  </g>
  <defs>
    <filter id="glow" x="20" y="20" width="152" height="152" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
